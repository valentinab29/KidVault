<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - KidVault</title>
    <link rel="stylesheet" href="forms.css">
</head>
<body>

    <div class="split-container">
        <div class="form-visual">
            <div class="brand">
                <img src="multimedia_Forms/Logo-GS-sinfuturo-SINFONDO.png"  alt="GlobalSeguros Logo" class="logo-img">
            </div>
            
            <div class="visual-content">
                <h1>Estamos contigo en este gran paso</h1>
                <img src="multimedia_Forms/Gorro.png" alt="Gorro" class="gorro">
            </div>
        </div>

        <div class="form-content">
            <h2>Contáctanos</h2>
            <p class="instruction">Completa la siguiente información para recibir asesoría personalizada y conocer más sobre nuestras soluciones educativas.</p>
            
            <form>
                <div class="campo">
                    <input type="text" id="nombre" placeholder="Nombres y Apellidos">
                </div>

                <div class="campo">
                    <input type="email" id="correo" placeholder="Correo Electrónico">
                </div>

                <div class="campo">
                    <input type="text" id="celular" placeholder="Número de Celular">
                </div>

                <div class="campo">
                    <input type="text" id="cedula" placeholder="Cédula">
                </div>

                <div class="campo">
                    <select id="ciudad">
                        <option value="">Selecciona tu ciudad</option>
                        <option value="Bogotá">Bogotá</option>
                        <option value="Medellín">Medellín</option>
                        <option value="Cali">Cali</option>
                        <option value="Barranquilla">Barranquilla</option>
                        <option value="Bucaramanga">Bucaramanga</option>
                        <option value="Manizales">Manizales</option>
                        <option value="Pasto">Pasto</option>
                        <option value="Pereira">Pereira</option>
                    </select>
                </div>

                <div class="campo">
                    <select id="consulta">
                        <option value="">Tipo de consulta</option>
                        <option value="Seguro">Quiero un seguro</option>
                        <option value="Información">Información de mis productos</option>
                        <option value="Soporte">Sugerencias</option>
                    </select>
                </div>

                <div class="campo">
                    <select id="producto">
                        <option value="">Producto</option>
                        <option value="Seguro Educativo">Seguros Educativos</option>
                        <option value="Seguro de Vida">Seguros de Vida</option>
                        <option value="Seguro de Pensión Voluntaria">Seguros de Pensión Voluntaria</option>
                        <option value="Seguro Rentas voluntarias">Seguros Rentas voluntarias</option>
                        <option value="Seguro Rentas Vitalicia">Seguros Rentas Vitalicia</option>
                        <option value="Seguro de Accidentes Personales">Seguros de Accidentes Personales</option>
                        <option value="Seguro Previsional de Invalidez y Sobrevivencia">Seguros Previsional de invalidez y Sobrevivencia</option>
                    </select>
                </div>

                <div class="campo">
                    <select id="origen">
                        <option value="">¿Cómo se enteró del producto?</option>
                        <option value="Redes Sociales">Redes Sociales</option>
                        <option value="Evento">Evento o feria</option>
                        <option value="web">Página Web</option>
                        <option value="Recomendación">Famulia o Amigo</option>
                    </select>
                </div>

                <div class="campo">
                    <textarea id="sugerencias" placeholder="Sugerencias y observaciones" rows="4"></textarea>
                </div>

                <input type="button" value="Enviar" class="btn-submit" onclick="enviarFormulario()">
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
